# Basic CI — typecheck and build only (Task 2.15)
# No secrets. No Supabase local smoke (requires Docker + dev:api).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build shared
        run: npm run build:shared

      - name: Build web
        run: npm run build:web

      - name: Build API
        run: npm run build:api