# CI — typecheck, lint, build, and auth/settings regression (Sprint 12 Task 12.6).
# No secrets. No Supabase/Docker smoke in CI (local-only — see docs/36, scripts/README.md).
# The E2E step runs only the self-contained auth-settings regression (mock + route-mocked
# API mode) — it needs no real Supabase/network. Broader smoke stays local.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build shared
        run: npm run build:shared

      - name: Build web
        run: npm run build:web

      - name: Build API
        run: npm run build:api

  e2e-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run auth/settings regression (mock + route-mocked API mode)
        run: |
          npm run dev &
          for i in $(seq 1 60); do curl -sf http://localhost:5173 >/dev/null 2>&1 && break; sleep 1; done
          SMOKE_WEB_BASE_URL=http://localhost:5173 npx playwright test e2e/auth-settings-regression.spec.ts
        working-directory: apps/web
