# VibeNovel API — Cloudflare Worker (local dev via `npm run dev:api`)
# Do not commit secrets. Use `.dev.vars` locally (see `.dev.vars.example`).

name = "vibenovel-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
APP_ENV = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,http://localhost:5175"

# SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY → .dev.vars only

[dev]
port = 8787
local_protocol = "http"

# Task 11.1 — staging Mode A (safe default). Secrets via: wrangler secret put <NAME> --env staging
[env.staging]
name = "vibenovel-api-staging"

[env.staging.vars]
APP_ENV = "staging"
ALLOWED_ORIGINS = "https://vibenovel-web-staging.pages.dev"
CREDIT_TOPUP_ENABLED = "false"
PAYMENT_PROVIDER = "mock"
PAYMENT_PROVIDER_MOCK = "true"
PAYMENT_PROVIDER_MOCK_MODE = "success"
AI_GENERATION_ENABLED = "false"
AI_PROVIDER_MOCK = "true"